<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ZeroAgentX — Coming Soon</title>
    <meta name="description" content="ZeroAgentX — Software · AI · Blockchain. Coming soon." />
    <meta name="theme-color" content="#041226" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
      :root{--bg:#061229;--card:#071428;--accent:#19d0ff;--muted:#9aa8b8;color-scheme:dark}
      *{box-sizing:border-box}
      html,body{height:100%}
      body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:#eef6ff;background:linear-gradient(180deg,#041226 0%,#071428 60%);display:flex;align-items:center;justify-content:center}
      .wrap{width:min(980px,94%);padding:36px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);box-shadow:0 6px 30px rgba(2,9,20,0.6);display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:center}
      .brand{display:flex;flex-direction:column;gap:14px}
      .logo{display:flex;align-items:center;gap:18px}
      .logo img{width:120px;height:auto;border-radius:8px}
      h1{margin:0;font-weight:900;font-size:44px;letter-spacing:-1px}
      .tag{color:var(--muted);font-weight:500}
      .pill{display:inline-block;margin-top:10px;padding:8px 12px;background:rgba(25,208,255,0.08);color:var(--accent);border-radius:999px;font-weight:700;font-size:13px}
      .right{padding:18px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent);text-align:center}
      .right p{margin:0;color:var(--muted)}
      .count{font-size:28px;font-weight:700;margin-top:8px}
      .actions{margin-top:18px;display:flex;gap:10px;justify-content:center}
      .btn{background:var(--accent);color:#041226;border:none;padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer}
      .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#cfe9ff}
      footer{margin-top:20px;color:var(--muted);font-size:13px}
      @media (max-width:900px){.wrap{grid-template-columns:1fr;text-align:center}.logo{justify-content:center}.right{text-align:center}}
    </style>
  </head>
  <body>
    <main class="wrap" role="main">
      <section class="brand" >
        <div class="logo">
          <img src="images/zeroagentx-logo.png" alt="ZeroAgentX logo" onerror="this.style.display='none'">
          <div>
            <div class="pill">Coming Soon</div>
            <h1>ZeroAgentX</h1>
            <div class="tag">Software · AI · Blockchain</div>
          </div>
        </div>

        <p style="color:var(--muted);line-height:1.5;margin-top:6px">We're building something new — a platform where advanced AI meets secure blockchain software. Sign up to get notified when we launch.</p>

        <footer>
          <strong style="color:#cfe9ff">Contact:</strong> <a href="mailto:hello@zeroagentx.com" style="color:var(--accent);text-decoration:none">hello@zeroagentx.com</a>
        </footer>
      </section>
    </main>
  </body>
</html>
